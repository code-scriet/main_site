services:
  # Playground Frontend (Static Site)
  - type: web
    name: playground-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    env: static
    domains:
      - code.codescriet.dev
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://playground-api.codescriet.dev
      - key: VITE_MAIN_SITE_URL
        value: https://codescriet.dev
      - key: VITE_MAIN_API_URL
        value: https://codescriet-api.onrender.com

  # Playground Execution Backend (Node.js API)
  - type: web
    name: playground-api
    runtime: node
    buildCommand: npm install
    startCommand: node execute-server.js
    env: node
    domains:
      - playground-api.codescriet.dev
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: ALLOWED_ORIGIN
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: EXECUTOR_URL
        value: https://codescriet-executor.developer-aary.workers.dev/execute
