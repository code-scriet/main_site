    <script>
      (function () {
        try {
          var theme = localStorage.getItem('codescriet-theme') === 'dark' ? 'dark' : 'light';
          var root = document.documentElement;
          root.classList.toggle('dark', theme === 'dark');
          root.style.colorScheme = theme;
          var metaThemeColor = document.querySelector('meta[name="theme-color"]');
          if (metaThemeColor) {
            metaThemeColor.setAttribute('content', theme === 'dark' ? '#05060a' : '#f97316');
          }
        } catch (error) {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>

    <!--
      AboutPage JSON-LD lives in the prerendered /about/index.html only
      (built by scripts/prerender.mjs). Keeping it in this site-wide template
      caused every page to claim to be the AboutPage — and produced two
      competing AboutPage blocks on /about/ itself.
    -->
  </head>
  <body>
    <!--
      Render's static service does NOT auto-resolve clean URLs to
      <path>/index.html, and the routes block in render.yaml is ignored
      because the codescriet-web service has a dashboard override.
      For prerendered listing routes, redirect to the trailing-slash form
      so the matching dist/<route>/index.html gets served.
      Runs synchronously before React boots, before the audit crawler
      reads body content.
    -->
    <script>
      (function () {
        var p = window.location.pathname;
        var routes = ['/about','/events','/team','/achievements','/announcements','/network','/contact','/join-us','/privacy-policy','/credits'];
        if (routes.indexOf(p) !== -1) {
          window.location.replace(p + '/' + window.location.search + window.location.hash);
        }
      })();
    </script>
