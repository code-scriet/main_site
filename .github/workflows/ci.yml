name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate --schema=prisma/schema.prisma

      - name: Lint API
        run: npm run lint --workspace=apps/api

      - name: Lint Web
        run: npm run lint --workspace=apps/web

      - name: Build API
        run: npm run build --workspace=apps/api

      - name: Build Web
        run: npm run build --workspace=apps/web

      # Fast, DB-free unit/stability tests (quiz scoring, auth/jwt, utils, web stores).
      - name: Stability tests
        run: npm run test:stability

      # Gate on HIGH+ advisories in production dependencies. The transitive `ws`
      # DoS (GHSA-96hv-2xvq-fx4p) that previously forced this non-blocking is now
      # fixed by pinning ws@^8.21.0 across the socket.io tree (root overrides), so
      # the gate is real again. Moderate findings are reported but do not fail.
      - name: Security audit (production deps)
        run: npm audit --omit=dev --audit-level=high
