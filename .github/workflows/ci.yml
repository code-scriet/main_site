name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate --schema=prisma/schema.prisma

      - name: Lint API
        run: npm run lint --workspace=apps/api

      - name: Lint Web
        run: npm run lint --workspace=apps/web

      - name: Build API
        run: npm run build --workspace=apps/api

      - name: Build Web
        run: npm run build --workspace=apps/web

      # Fast, DB-free unit/stability tests (quiz scoring, auth/jwt, utils, web stores).
      - name: Stability tests
        run: npm run test:stability

      # Surface HIGH+ advisories in production dependencies. Reported in the log
      # but non-blocking: the tree is dominated by transitive advisories we can't
      # patch directly (e.g. ws via socket.io/engine.io — GHSA-96hv-2xvq-fx4p),
      # which would otherwise block every PR until an upstream release adopts the
      # fix. Review the step output and bump the relevant dependency when a patched
      # upstream version ships, rather than gating merges on it.
      - name: Security audit (production deps)
        continue-on-error: true
        run: npm audit --omit=dev --audit-level=high
