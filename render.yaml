# Render Blueprint for code.scriet
services:
  # Backend API
  - type: web
    name: codescriet-api
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npx prisma generate --schema=./prisma/schema.prisma && npm run build --workspace=apps/api
    startCommand: npx prisma migrate resolve --rolled-back 20260220003000_harden_email_and_network_query_indexes --schema=./prisma/schema.prisma || true && npx prisma migrate deploy --schema=./prisma/schema.prisma && npm run start --workspace=apps/api
    healthCheckPath: /ping
    envVars:
      - key: NODE_ENV
        value: production
      # Hard Constraint #4 in CLAUDE.md: keep Node's heap under the 512 MB
      # Render free-tier ceiling so we don't OOM-kill under load.
      - key: NODE_OPTIONS
        value: --max-old-space-size=400
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: PRISMA_CLIENT_ENGINE_TYPE
        value: binary
      - key: JWT_SECRET
        sync: false
      - key: ATTENDANCE_JWT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

  # Frontend Static Site
  - type: web
    name: codescriet-web
    runtime: static
    plan: free
    buildCommand: npm install && node scripts/generate-sitemap.js && npm run build --workspace=apps/web && node scripts/prerender.js
    staticPublishPath: ./apps/web/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    # Headers also defined in apps/web/public/_headers (Netlify-style, takes
    # precedence at runtime on Render's static service). Mirrored here so
    # config-as-code stays accurate.
    headers:
      - path: /*
        name: Strict-Transport-Security
        value: max-age=63072000; includeSubDomains; preload
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Permissions-Policy
        value: interest-cohort=()
      - path: /*
        name: Content-Security-Policy
        value: "default-src * data: blob: 'unsafe-inline' 'unsafe-eval'; script-src * 'unsafe-inline' 'unsafe-eval' data: blob:; style-src * 'unsafe-inline' data:; img-src * data: blob:; media-src * data: blob:; font-src * data:; connect-src * data: blob: wss: ws:; frame-src *; child-src *; worker-src * blob: data:; manifest-src *; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; upgrade-insecure-requests"
      - path: /index.html
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_PLAYGROUND_URL
        value: https://code.codescriet.dev

  # Playground Backend (Code Execution Server)
  # Separate Node.js service — does NOT share CPU/RAM with main API
  - type: web
    name: codescriet-playground-api
    runtime: node
    plan: free
    rootDir: apps/playground
    buildCommand: npm install
    startCommand: node execute-server.js
    healthCheckPath: /health
    buildFilter:
      paths:
        - apps/playground/**
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false            # REQUIRED: same DATABASE_URL as the main codescriet-api service
      - key: ALLOWED_ORIGIN
        value: https://code.codescriet.dev,https://codescriet.dev,https://www.codescriet.dev
      - key: JWT_SECRET
        sync: false            # Must match main API's JWT_SECRET for shared auth
      - key: EXECUTOR_URL
        value: https://codescriet-executor.developer-aary.workers.dev/execute

  # Playground Frontend (Static Site)
  - type: web
    name: codescriet-playground-web
    runtime: static
    plan: free
    rootDir: apps/playground
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    buildFilter:
      paths:
        - apps/playground/**
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: Cross-Origin-Opener-Policy
        value: same-origin
      - path: /*
        name: Cross-Origin-Embedder-Policy
        value: credentialless
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /index.html
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    envVars:
      - key: VITE_API_URL
        sync: false            # Set to https://playground-api.codescriet.dev in Render
      - key: VITE_MAIN_SITE_URL
        value: https://codescriet.dev
      - key: VITE_MAIN_API_URL
        value: https://api.codescriet.dev
