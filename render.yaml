# Render Blueprint for code.scriet
services:
  # Backend API
  - type: web
    name: codescriet-api
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npx prisma generate --schema=./prisma/schema.prisma && npm run build --workspace=apps/api
    # TODO(remove after 2026-08-01): this keeps one historical failed deploy
    # unblocked while Render catches up; delete once every environment has moved
    # past 20260220003000_harden_email_and_network_query_indexes.
    startCommand: npx prisma migrate resolve --rolled-back 20260220003000_harden_email_and_network_query_indexes --schema=./prisma/schema.prisma || true && npx prisma migrate deploy --schema=./prisma/schema.prisma && npm run start --workspace=apps/api
    healthCheckPath: /ping
    # G2: without a buildFilter, ANY commit (homepage copy tweaks included)
    # triggers an API deploy — and an API restart persists live quizzes as
    # ABANDONED. Scope API deploys to paths that can change API behavior.
    buildFilter:
      paths:
        - apps/api/**
        - prisma/**
        - package.json
        - package-lock.json
    envVars:
      - key: NODE_ENV
        value: production
      # Hard Constraint #4 in CLAUDE.md: keep Node's heap under the 512 MB
      # Render free-tier ceiling so we don't OOM-kill under load.
      - key: NODE_OPTIONS
        value: --max-old-space-size=400
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: PRISMA_CLIENT_ENGINE_TYPE
        value: binary
      # Run the in-process schedulers: event-status sync, event reminders, and
      # QOTD auto-publish. The API already defaults these ON in production (see
      # apps/api/src/index.ts), so this is an explicit belt-and-suspenders pin in
      # case env vars are managed outside this blueprint. Set to "false" to
      # force-disable. Safe on free tier — UptimeRobot keeps the instance warm.
      - key: ENABLE_BACKGROUND_SCHEDULERS
        value: "true"
      - key: JWT_SECRET
        sync: false
      - key: ATTENDANCE_JWT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      # Contest relay/offload → playground execute-server. Set this ONE value to the
      # playground-api origin (e.g. https://codescriet-playground-api.onrender.com; a bare
      # host is accepted, https:// is assumed) to turn the relay + plagiarism offload on.
      # Unset ⇒ clients poll + plagiarism runs inline (nothing breaks). The shared
      # INTERNAL_API_SECRET is auto-derived from JWT_SECRET (already shared with the
      # playground), so it needs no separate config; set it explicitly on BOTH services
      # only to override the derived value.
      - key: PLAYGROUND_API_URL
        sync: false

  # Frontend Static Site
  - type: web
    name: codescriet-web
    runtime: static
    plan: free
    # apps/web/package.json now has `prebuild` (generate-sitemap) and
    # `postbuild` (prerender) hooks, so `npm run build --workspace=apps/web`
    # runs the full chain hermetically — no need to spell it out here.
    buildCommand: npm install && npm run build --workspace=apps/web
    staticPublishPath: ./apps/web/dist
    routes:
      # Phantom sitemap discovery paths → canonical sitemap (closes
      # crawl/sitemap-valid). Specific rules must precede the catch-all.
      - type: rewrite
        source: /sitemap_index.xml
        destination: /sitemap.xml
      - type: rewrite
        source: /sitemap-index.xml
        destination: /sitemap.xml
      - type: rewrite
        source: /sitemaps.xml
        destination: /sitemap.xml
      - type: rewrite
        source: /sitemap1.xml
        destination: /sitemap.xml
      - type: rewrite
        source: /post-sitemap.xml
        destination: /sitemap.xml
      # Listing/static prerendered routes — make /about resolve to the real
      # apps/web/dist/about/index.html file built by scripts/prerender.mjs.
      # Render's default routing rewrites every extension-less path to
      # /index.html, bypassing the prerender output, so we need these
      # explicit mappings (clean_urls semantics).
      - type: rewrite
        source: /about
        destination: /about/index.html
      - type: rewrite
        source: /events
        destination: /events/index.html
      - type: rewrite
        source: /team
        destination: /team/index.html
      - type: rewrite
        source: /achievements
        destination: /achievements/index.html
      - type: rewrite
        source: /announcements
        destination: /announcements/index.html
      - type: rewrite
        source: /network
        destination: /network/index.html
      - type: rewrite
        source: /contact
        destination: /contact/index.html
      - type: rewrite
        source: /join-us
        destination: /join-us/index.html
      - type: rewrite
        source: /privacy-policy
        destination: /privacy-policy/index.html
      - type: rewrite
        source: /credits
        destination: /credits/index.html
      # Detail-route SPA fallback (FIXES the blank-page-on-reload bug).
      # The listing prerender above writes apps/web/dist/<prefix>/index.html,
      # which makes dist/events, dist/team, dist/network, dist/achievements and
      # dist/announcements real DIRECTORIES. When Render gets /events/<slug>
      # (or any deeper path) it resolves INTO that existing directory, fails to
      # find the sub-file, and returns an empty 200 — it never reaches the
      # generic /* catch-all below. The result is a blank page on every
      # detail-route reload/deep-link. Non-shadowed subtrees (/dashboard/*,
      # /polls/*, /verify/*, …) work because no same-named dist dir exists.
      # These explicit /<prefix>/* rules run BEFORE the directory resolution
      # and force the SPA shell, so the React router renders the detail page
      # (or its own "not found" state). NOTE: this also means any future
      # per-slug prerendered detail HTML under these prefixes is shadowed by
      # the SPA shell — acceptable today because that output is not deployed
      # (dist/events/<slug>/index.html 404s in prod). If detail prerender is
      # ever restored for crawlers, switch these to destination
      # /<prefix>/:splat/index.html and accept a hard 404 on missing slugs.
      #
      # Trailing-slash listing guards FIRST: the canonical listing URL is
      # /<prefix>/ (with slash, per sitemap + rel=canonical). Pin it to the
      # prerendered listing explicitly so the /<prefix>/* fallback below can
      # never shadow it, regardless of whether Render's `*` matches an empty
      # segment.
      - type: rewrite
        source: /events/
        destination: /events/index.html
      - type: rewrite
        source: /team/
        destination: /team/index.html
      - type: rewrite
        source: /network/
        destination: /network/index.html
      - type: rewrite
        source: /achievements/
        destination: /achievements/index.html
      - type: rewrite
        source: /announcements/
        destination: /announcements/index.html
      - type: rewrite
        source: /events/*
        destination: /index.html
      - type: rewrite
        source: /team/*
        destination: /index.html
      - type: rewrite
        source: /network/*
        destination: /index.html
      - type: rewrite
        source: /achievements/*
        destination: /index.html
      - type: rewrite
        source: /announcements/*
        destination: /index.html
      # SPA catch-all — every other path (non-shadowed dynamic routes like
      # /dashboard/*, /polls/<slug>, /verify/<id>) falls through to the shell.
      - type: rewrite
        source: /*
        destination: /index.html
    # SECURITY HEADERS — SOURCE OF TRUTH, BUT NOT AUTO-APPLIED.
    # The live codescriet-web service is configured through the Render
    # dashboard, which overrides this blueprint — so editing this `headers:`
    # block (or apps/web/public/static.json, which Render does NOT honor at
    # all) does NOT change what the browser receives. Verified 2026-06-07
    # via `curl -I https://codescriet.dev` on a cache MISS: only
    # x-content-type-options reaches the client; CSP/HSTS/X-Frame-Options/
    # Referrer-Policy/Permissions-Policy are all absent.
    # TO ACTUALLY SHIP THESE: paste the values below into the Render
    # dashboard (codescriet-web → Settings → Headers) or a Cloudflare
    # Transform Rule (Response Header Modification). Keep render.yaml and
    # apps/web/public/static.json byte-for-byte in sync as the canonical copy.
    headers:
      - path: /*
        name: Strict-Transport-Security
        value: max-age=63072000; includeSubDomains; preload
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Permissions-Policy
        value: interest-cohort=()
      # CSP (H2): hardened from the previous wide-open `*` policy. Removes
      # `script-src *` and `'unsafe-eval'` so injected/XSS payloads can no longer
      # load external scripts or eval. The host allowlist was validated against
      # the app's actual external resources (index.html + src):
      #   - script-src: static.cloudflareinsights.com (CF Web Analytics beacon)
      #   - style-src + font-src: Google Fonts (fonts.googleapis.com/gstatic.com)
      #   - frame-src https: covers YouTube + Google Maps embeds
      # `'unsafe-inline'` stays on script-src/style-src because index.html ships
      # inline bootstrap scripts/JSON-LD/styles and Render static hosting can't
      # inject per-request nonces; the next hardening step is nonce/hash-based
      # inline scripts → then drop it. connect-src is intentionally broad for now
      # (script-src is the real XSS control); narrowing it to explicit hosts is a
      # follow-up. Recommend a Report-Only canary deploy before/with enforcing.
      # NOTE: keep this byte-for-byte in sync with apps/web/public/static.json.
      - path: /*
        name: Content-Security-Policy
        value: "default-src 'self'; script-src 'self' 'unsafe-inline' https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https:; font-src 'self' data: https://fonts.gstatic.com; media-src 'self' blob: https:; connect-src 'self' https: wss: blob: data:; worker-src 'self' blob:; frame-src 'self' https:; manifest-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; upgrade-insecure-requests"
      - path: /index.html
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_PLAYGROUND_URL
        value: https://code.codescriet.dev
      # OPTIONAL (build-time): execute-server origin the ADMIN live-monitor opens its
      # /competition socket against. Unset ⇒ the monitor uses REST polling (fine). The
      # contestant arena uses VITE_API_URL, so leaving this blank does NOT affect contestants.
      # - key: VITE_PLAYGROUND_API_URL
      #   sync: false

  # Playground Backend (Code Execution Server)
  # Separate Node.js service — does NOT share CPU/RAM with main API
  - type: web
    name: codescriet-playground-api
    runtime: node
    plan: free
    rootDir: apps/playground
    buildCommand: npm install
    startCommand: node execute-server.js
    healthCheckPath: /health
    buildFilter:
      paths:
        - apps/playground/**
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false            # REQUIRED: same DATABASE_URL as the main codescriet-api service
      - key: ALLOWED_ORIGIN
        value: https://code.codescriet.dev,https://codescriet.dev,https://www.codescriet.dev
      - key: JWT_SECRET
        sync: false            # Must match main API's JWT_SECRET for shared auth.
                               # The contest relay's INTERNAL_API_SECRET auto-derives from
                               # this, so no separate secret is needed (set INTERNAL_API_SECRET
                               # on BOTH services only to override the derived value).
      - key: EXECUTOR_URL
        value: https://codescriet-executor.developer-aary.workers.dev/execute
      - key: EXECUTOR_SECRET
        sync: false            # M1: shared secret with the CF Worker. Set the SAME value
                               # here and in the Worker's env (Cloudflare dashboard) to
                               # stop the worker being used as an open code-exec relay.

  # Playground Frontend (Static Site)
  - type: web
    name: codescriet-playground-web
    runtime: static
    plan: free
    rootDir: apps/playground
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    buildFilter:
      paths:
        - apps/playground/**
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: Cross-Origin-Opener-Policy
        value: same-origin
      - path: /*
        name: Cross-Origin-Embedder-Policy
        value: credentialless
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /index.html
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    envVars:
      - key: VITE_API_URL
        sync: false            # Set to https://playground-api.codescriet.dev in Render
      - key: VITE_MAIN_SITE_URL
        value: https://codescriet.dev
      - key: VITE_MAIN_API_URL
        value: https://api.codescriet.dev
