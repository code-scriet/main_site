# Render Blueprint for code.scriet
services:
  # Backend API
  - type: web
    name: codescriet-api
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npx prisma generate --schema=./prisma/schema.prisma && npm run build --workspace=apps/api
    startCommand: npx prisma migrate resolve --rolled-back 20260220003000_harden_email_and_network_query_indexes --schema=./prisma/schema.prisma || true && npx prisma migrate deploy --schema=./prisma/schema.prisma && npm run start --workspace=apps/api
    healthCheckPath: /ping
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: PRISMA_CLIENT_ENGINE_TYPE
        value: binary
      - key: JWT_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

  # Frontend Static Site
  - type: web
    name: codescriet-web
    runtime: static
    plan: free
    buildCommand: npm install && npm run build --workspace=apps/web
    staticPublishPath: ./apps/web/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /index.html
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_PLAYGROUND_URL
        value: https://code.codescriet.dev

  # Playground Backend (Code Execution Server)
  # Separate Node.js service — does NOT share CPU/RAM with main API
  - type: web
    name: codescriet-playground-api
    runtime: node
    plan: free
    rootDir: apps/playground
    buildCommand: npm install
    startCommand: node execute-server.js
    healthCheckPath: /health
    buildFilter:
      paths:
        - apps/playground/**
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: ALLOWED_ORIGIN
        sync: false            # Set to https://playground.codescriet.dev in Render dashboard
      - key: JWT_SECRET
        sync: false            # Must match main API's JWT_SECRET for shared auth
      - key: EXECUTOR_URL
        value: https://codescriet-executor.developer-aary.workers.dev/execute

  # Playground Frontend (Static Site)
  - type: web
    name: codescriet-playground-web
    runtime: static
    plan: free
    rootDir: apps/playground
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    buildFilter:
      paths:
        - apps/playground/**
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /index.html
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    envVars:
      - key: VITE_API_URL
        sync: false            # Set to https://playground-api.codescriet.dev in Render
      - key: VITE_MAIN_SITE_URL
        value: https://codescriet.dev
      - key: VITE_MAIN_API_URL
        value: https://codescriet-api.onrender.com
